<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址导航 - 简洁高效</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 顶部 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">🔖 网址导航</div>
            <div class="search">
                <input type="text" id="search-input" placeholder="搜索网站...">
            </div>
            <div class="header-actions">
                <button class="btn" id="fav-btn">⭐ 收藏 <span id="fav-count">0</span></button>
                <button class="btn btn-outline" id="admin-btn">管理</button>
            </div>
        </div>
    </header>

    <!-- 主内容区：左侧分类 + 右侧网站 -->
    <div class="main-container">
        <!-- 左侧分类栏 -->
        <aside class="home-sidebar">
            <div class="sidebar-title">分类</div>
            <div class="cat-list" id="cat-list"></div>
        </aside>
        
        <!-- 右侧网站网格 -->
        <main class="main">
            <div class="tool-grid" id="tool-grid"></div>
            <div class="empty" id="empty" style="display:none">
                <p>暂无结果</p>
            </div>
        </main>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 网址导航 · 简洁高效</p>
    </footer>

    <!-- 收藏侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>⭐ 我的收藏</h3>
            <button class="close" id="close-fav">×</button>
        </div>
        <div class="sidebar-content" id="fav-list"></div>
    </aside>

    <!-- 详情弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">×</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- 密码验证模态框 -->
    <div class="modal" id="password-modal">
        <div class="modal-content">
            <button class="modal-close" id="password-close">×</button>
            <h3>请输入管理密码</h3>
            <form id="password-form">
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password-input" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">确认</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div class="modal" id="change-password-modal">
        <div class="modal-content">
            <button class="modal-close" id="change-password-close">×</button>
            <h3>修改管理密码</h3>
            <form id="change-password-form">
                <div class="form-group">
                    <label>旧密码</label>
                    <input type="password" id="old-password" required>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="new-password" required>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" id="confirm-password" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn">保存</button>
                    <button type="button" class="btn btn-outline" id="change-password-cancel">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 管理后台 -->
    <div class="admin" id="admin">
        <div class="admin-overlay"></div>
        <div class="admin-panel">
            <div class="admin-header">
                <h2>管理后台</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-sm btn-outline" id="change-password-btn">修改密码</button>
                    <button class="close" id="admin-close">×</button>
                </div>
            </div>
            
            <div class="admin-body">
                <!-- 左侧：分类 -->
                <aside class="admin-sidebar">
                    <div class="sidebar-header">
                        <h3>分类</h3>
                        <button class="btn btn-sm" id="add-cat">+</button>
                    </div>
                    <div class="admin-cat-list" id="admin-cat-list"></div>
                </aside>
                
                <!-- 右侧：网站 -->
                <div class="admin-main">
                    <div class="inline-form" id="inline-form">
                        <h4 id="form-title">添加网站</h4>
                        <form id="site-form">
                            <input type="hidden" id="site-id">
                            <div class="form-row">
                                <div class="form-group" style="flex:2">
                                    <label>名称 *</label>
                                    <input type="text" id="site-name" required>
                                </div>
                                <div class="form-group" style="flex:1">
                                    <label>图标 (URL/emoji)</label>
                                    <input type="text" id="site-icon" placeholder="可选">
                                </div>
                                <div class="form-group" style="flex:2">
                                    <label>分类 *</label>
                                    <select id="site-cat" required></select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>描述</label>
                                    <input type="text" id="site-desc">
                                </div>
                                <div class="form-group">
                                    <label>网址 *</label>
                                    <input type="url" id="site-url" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn">保存</button>
                                <button type="button" class="btn btn-outline" id="form-cancel">取消</button>
                            </div>
                        </form>
                    </div>
                    
                    <div class="toolbar">
                        <button class="btn" id="add-site">+ 添加网站</button>
                        <button class="btn btn-outline" id="import-btn">导入</button>
                        <button class="btn btn-outline" id="export-btn">导出</button>
                    </div>
                    <table class="table">
                        <thead>
                            <tr><th>ID</th><th>名称</th><th>分类</th><th>描述</th><th>操作</th></tr>
                        </thead>
                        <tbody id="sites-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
